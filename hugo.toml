baseURL = "https://cultureofcode.net"
languageCode = "en"
title = "Culture of Code"
theme = "coc"
ignoreErrors = ["error-remote-getjson"]

[pagination]
pagerSize = 9

[markup.highlight]
codeFences = true
guessSyntax = true
hl_Lines = ""
lineNoStart = 1
lineNos = true
lineNumbersInTable = true
noClasses = true
style = "monokailight"
tabWidth = 2

[markup.goldmark.parser]
wrapStandAloneImageWithinParagraph = false

[markup.goldmark.renderer]
unsafe = true

[markup.goldmark.parser.attribute]
block = true
title = true

[params]
authorDisplayName = "kenneth"
authorUrl = "https://kennethbowen.com"
authorEmail = "kenneth@kennethbowen.com"
